<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Assistant Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

<div class="sidebar">

<h2>🤖 AI BOT</h2>

<ul>
<li><i class="fa fa-comments"></i> Chat</li>
<li><i class="fa fa-microphone"></i> Voice</li>
<li><i class="fa fa-robot"></i> AI Assistant</li>
</ul>

</div>

<div class="chat-area">

<div class="header">

<h3>AI Chat Assistant</h3>

<button onclick="clearChat()">Clear</button>

</div>

<div id="welcome" class="welcome">

<h2>Welcome to AI Chatbot</h2>

<p>Ask questions about Artificial Intelligence, Machine Learning, Programming, and Technology.</p>

</div>

<div id="chatbox"></div>

<div class="input-area">

<input type="text"
id="userInput"
placeholder="Type your message..."
onkeydown="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()">
<i class="fa fa-paper-plane"></i>
</button>

<button onclick="startVoice()">
<i class="fa fa-microphone"></i>
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
